image:
  tag: dev
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
podAnnotations:
  deploy-timestamp: "2026-04-07T05:57:32Z"
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
resources:
  requests:
    cpu: "10m"
    memory: "256Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"
