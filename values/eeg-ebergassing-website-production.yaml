replicaCount: 2

image:
  repository: ghcr.io/colibrie-eu/eeg-ebergassing-website
  pullPolicy: IfNotPresent
  tag: 1.0.0

serviceAccount:
  automount: false

podAnnotations:
  deploy-timestamp: "2026-07-21T12:00:00Z"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 101

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: "10m"
    memory: "32Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

volumes:
  - name: nginx-tmp
    emptyDir:
      medium: Memory
      sizeLimit: 16Mi

volumeMounts:
  - name: nginx-tmp
    mountPath: /tmp
